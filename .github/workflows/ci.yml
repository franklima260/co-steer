name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Production build
        run: npm run package

      # The @vscode/test-electron harness needs a display; xvfb provides a virtual one.
      - name: Run tests (headless)
        run: xvfb-run -a npm test
